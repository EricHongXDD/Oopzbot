name: Docker Build

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - .dockerignore
      - .github/workflows/docker-build.yml
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --pull -t oopzbot:test .
