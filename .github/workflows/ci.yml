name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit-tests / python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      BOT_REDIS_HOST: 127.0.0.1
      BOT_REDIS_PORT: "6379"
      BOT_DISABLE_AUTO_START_NETEASE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install "httpx>=0.27,<1"

      - name: Prepare runtime config
        run: |
          cp config.example.py config.py
          cp private_key.example.py private_key.py
          mkdir -p data logs

      - name: Syntax check
        run: python -m compileall -q main.py src plugins tools

      - name: Run regression tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
