# Oopz Bot 反向代理站点配置
# 裸机部署：复制到 /etc/nginx/sites-available/oopzbot，然后 ln -s 到 sites-enabled
# Docker 部署：在 docker-compose.yml 中挂载为 /etc/nginx/conf.d/default.conf

upstream bot_backend {
    server 127.0.0.1:8080;
    # server bot:8080;          # Docker Compose 环境取消此行注释，注释上一行
    keepalive 16;
}

upstream netease_backend {
    server 127.0.0.1:3000;
    # server netease-api:3000;  # Docker Compose 环境取消此行注释，注释上一行
    keepalive 8;
}

# === HTTP (80) → 301 HTTPS ===
server {
    listen 80;
    server_name traceck.online;
    return 301 https://$host$request_uri;
}

# === HTTPS (443) ===
server {
    listen 443 ssl http2;
    server_name traceck.online;

    # --- TLS ---
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- 安全头 ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    gzip_vary on;

    # --- 公共代理头 ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://bot_backend;
    }

    # SSE 长连接
    location /admin/api/overview/stream {
        proxy_pass http://bot_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /netease-api/ {
        proxy_pass http://netease_backend/;
    }
}
